<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MedLembrete — Sistema de Lembrete de Medicamentos. Gerencie seus remédios e horários de forma simples.">
  <title>MedLembrete — Sistema de Lembrete de Medicamentos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-body: #0a0a0f;
      --bg-terminal: #11111b;
      --bg-titlebar: #1a1a2e;
      --border-terminal: #2a2a4a;
      --text-primary: #cdd6f4;
      --text-dim: #6c7086;
      --accent-green: #a6e3a1;
      --accent-red: #f38ba8;
      --accent-yellow: #f9e2af;
      --accent-blue: #89b4fa;
      --accent-cyan: #94e2d5;
      --accent-mauve: #cba6f7;
      --accent-peach: #fab387;
      --dot-red: #ff5f57;
      --dot-yellow: #febc2e;
      --dot-green: #28c840;
      --glow-cyan: rgba(148, 226, 213, 0.15);
      --glow-mauve: rgba(203, 166, 247, 0.10);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-body);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image:
        radial-gradient(ellipse at 20% 50%, var(--glow-mauve) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 50%, var(--glow-cyan) 0%, transparent 50%);
    }

    /* ===== HEADER ===== */
    .header {
      text-align: center;
      margin-bottom: 24px;
      animation: fadeInDown 0.6s ease-out;
    }

    .header h1 {
      font-family: 'Inter', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-mauve));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .header p {
      color: var(--text-dim);
      font-size: 0.9rem;
      margin-top: 6px;
    }

    /* ===== TERMINAL WINDOW ===== */
    .terminal-window {
      width: 100%;
      max-width: 750px;
      border-radius: 14px;
      border: 1px solid var(--border-terminal);
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 20px 60px rgba(0,0,0,0.5),
        0 0 80px var(--glow-cyan);
      animation: fadeInUp 0.7s ease-out;
    }

    .terminal-titlebar {
      background: var(--bg-titlebar);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border-terminal);
      user-select: none;
    }

    .terminal-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      transition: transform 0.2s ease;
    }

    .terminal-dot:hover { transform: scale(1.25); }
    .terminal-dot.red { background: var(--dot-red); }
    .terminal-dot.yellow { background: var(--dot-yellow); }
    .terminal-dot.green { background: var(--dot-green); }

    .terminal-title {
      flex: 1;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-dim);
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .terminal-body {
      background: var(--bg-terminal);
      padding: 20px;
      min-height: 420px;
      max-height: 520px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.88rem;
      line-height: 1.7;
      scroll-behavior: smooth;
    }

    .terminal-body::-webkit-scrollbar { width: 6px; }
    .terminal-body::-webkit-scrollbar-track { background: transparent; }
    .terminal-body::-webkit-scrollbar-thumb {
      background: var(--border-terminal);
      border-radius: 3px;
    }

    /* ===== TERMINAL OUTPUT LINES ===== */
    .line { margin-bottom: 2px; white-space: pre-wrap; word-break: break-word; }
    .line.cyan { color: var(--accent-cyan); }
    .line.green { color: var(--accent-green); }
    .line.red { color: var(--accent-red); }
    .line.yellow { color: var(--accent-yellow); }
    .line.blue { color: var(--accent-blue); }
    .line.mauve { color: var(--accent-mauve); }
    .line.dim { color: var(--text-dim); }
    .line.peach { color: var(--accent-peach); }
    .line.bold { font-weight: 700; }

    .line-fade-in {
      animation: lineFade 0.25s ease-out;
    }

    /* ===== INPUT AREA ===== */
    .input-row {
      display: flex;
      align-items: center;
      margin-top: 4px;
    }

    .input-prompt {
      color: var(--accent-green);
      margin-right: 8px;
      font-weight: 700;
      white-space: nowrap;
    }

    .terminal-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.88rem;
      caret-color: var(--accent-cyan);
    }

    .terminal-input::placeholder {
      color: var(--text-dim);
      opacity: 0.5;
    }

    /* ===== TABLE ===== */
    .med-table {
      width: 100%;
      border-collapse: collapse;
      margin: 8px 0;
      font-size: 0.82rem;
    }

    .med-table th {
      color: var(--accent-mauve);
      text-align: left;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border-terminal);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 0.75rem;
    }

    .med-table td {
      padding: 5px 10px;
      border-bottom: 1px solid rgba(42, 42, 74, 0.4);
      color: var(--text-primary);
    }

    .med-table tr:last-child td { border-bottom: none; }

    .med-table tr:hover td {
      background: rgba(148, 226, 213, 0.04);
    }

    .med-table .id-cell {
      color: var(--text-dim);
      font-size: 0.72rem;
      max-width: 90px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ===== FOOTER ===== */
    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-dim);
      animation: fadeInDown 0.8s ease-out;
    }

    .footer a {
      color: var(--accent-cyan);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer a:hover { color: var(--accent-mauve); }

    /* ===== STATUS BAR ===== */
    .status-bar {
      background: var(--bg-titlebar);
      padding: 8px 16px;
      border-top: 1px solid var(--border-terminal);
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--dot-green);
      animation: pulse 2s infinite;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes lineFade {
      from { opacity: 0; transform: translateX(-6px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      body { padding: 12px; }
      .header h1 { font-size: 1.5rem; }
      .terminal-body { min-height: 350px; max-height: 450px; padding: 14px; font-size: 0.82rem; }
      .terminal-input { font-size: 0.82rem; }
      .med-table { font-size: 0.75rem; }
    }
  </style>
</head>
<body>

  <header class="header">
    <h1>💊 MedLembrete</h1>
    <p>Sistema de Lembrete de Medicamentos</p>
  </header>

  <main class="terminal-window" id="terminal-window">
    <div class="terminal-titlebar">
      <div class="terminal-dot red"></div>
      <div class="terminal-dot yellow"></div>
      <div class="terminal-dot green"></div>
      <span class="terminal-title">medlembrete — node index.js</span>
    </div>
    <div class="terminal-body" id="terminal-body">
      <!-- Output lines rendered here -->
    </div>
    <div class="status-bar">
      <div class="status-indicator">
        <div class="status-dot"></div>
        <span>conectado</span>
      </div>
      <span id="med-count">0 medicamentos</span>
    </div>
  </main>

  <footer class="footer">
    Feito com ♥ usando Node.js &amp; Vercel &middot;
    <a href="https://brasilapi.com.br" target="_blank" rel="noopener">BrasilAPI</a>
  </footer>

<script>
// ================================================
// MedLembrete — Terminal Web
// ================================================

const terminalBody = document.getElementById('terminal-body');
const medCountEl = document.getElementById('med-count');

// ---- Estado da aplicação ----
let medications = [];
let currentState = 'MENU';
let tempMed = {};

// ---- Helpers de renderização ----
function addLine(text, cssClass = '', animate = true) {
  const div = document.createElement('div');
  div.className = 'line' + (cssClass ? ' ' + cssClass : '') + (animate ? ' line-fade-in' : '');
  div.textContent = text;
  terminalBody.appendChild(div);
  scrollToBottom();
}

function addHTML(html, animate = true) {
  const div = document.createElement('div');
  div.className = animate ? 'line-fade-in' : '';
  div.innerHTML = html;
  terminalBody.appendChild(div);
  scrollToBottom();
}

function addBlank() {
  addLine('', '', false);
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    terminalBody.scrollTop = terminalBody.scrollHeight;
  });
}

function updateMedCount() {
  const n = medications.length;
  medCountEl.textContent = n === 1 ? '1 medicamento' : n + ' medicamentos';
}

function generateId() {
  return crypto.randomUUID ? crypto.randomUUID() : 
    'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
}

// ---- Input handling ----
function showInput(promptText, placeholder) {
  const row = document.createElement('div');
  row.className = 'input-row line-fade-in';

  const label = document.createElement('span');
  label.className = 'input-prompt';
  label.textContent = promptText;

  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'terminal-input';
  input.id = 'active-input';
  input.autocomplete = 'off';
  input.spellcheck = false;
  if (placeholder) input.placeholder = placeholder;

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const value = input.value;
      // Freeze input
      input.disabled = true;
      input.style.color = 'var(--text-dim)';
      processInput(value);
    }
  });

  row.appendChild(label);
  row.appendChild(input);
  terminalBody.appendChild(row);
  scrollToBottom();

  // Focus with small delay for animation
  setTimeout(() => input.focus(), 80);
}

// ---- Menu ----
function showMenu() {
  currentState = 'MENU';
  addBlank();
  addLine('═══════════════════════════════════════════', 'cyan');
  addLine('   💊 Sistema de Lembrete de Medicamentos  ', 'cyan bold');
  addLine('═══════════════════════════════════════════', 'cyan');
  addBlank();
  addLine('  [1]  Adicionar Remédio', '');
  addLine('  [2]  Ver Agenda', '');
  addLine('  [3]  Remover Medicamento', '');
  addLine('  [4]  Limpar Terminal', '');
  addBlank();
  showInput('❯', 'Escolha uma opção (1-4)');
}

// ---- Process user input based on state ----
function processInput(value) {
  const v = value.trim();

  switch (currentState) {
    case 'MENU':
      handleMenu(v);
      break;
    case 'ADD_NAME':
      tempMed.name = v;
      if (!v) {
        addLine('✖ O nome do medicamento não pode ser vazio.', 'red');
        currentState = 'MENU';
        showMenu();
        return;
      }
      currentState = 'ADD_DOSAGE';
      showInput('Dosagem:', '500mg');
      break;
    case 'ADD_DOSAGE':
      tempMed.dosage = v || '';
      currentState = 'ADD_TIME';
      showInput('Horário:', 'HH:mm');
      break;
    case 'ADD_TIME':
      if (!/^([01]\d|2[0-3]):([0-5]\d)$/.test(v)) {
        addLine('✖ O horário deve seguir o formato HH:mm (ex: 08:30).', 'red');
        currentState = 'MENU';
        showMenu();
        return;
      }
      tempMed.time = v;
      currentState = 'ADD_CEP';
      showInput('CEP:', '01001000');
      break;
    case 'ADD_CEP':
      handleCepAndRegister(v);
      break;
    case 'REMOVE_ID':
      handleRemove(v);
      break;
    default:
      showMenu();
  }
}

function handleMenu(option) {
  switch (option) {
    case '1':
      addBlank();
      addLine('── Novo Medicamento ──', 'blue bold');
      addBlank();
      tempMed = {};
      currentState = 'ADD_NAME';
      showInput('Nome:', 'Aspirina');
      break;
    case '2':
      listMedications();
      break;
    case '3':
      removeMedicationPrompt();
      break;
    case '4':
      terminalBody.innerHTML = '';
      addLine('Terminal limpo.', 'dim');
      showMenu();
      break;
    default:
      addLine('✖ Opção inválida. Escolha de 1 a 4.', 'red');
      showMenu();
  }
}

// ---- CEP Lookup + Register ----
async function handleCepAndRegister(cep) {
  addBlank();
  addLine('⏳ Buscando localização...', 'yellow');

  try {
    const sanitized = cep.replace(/\D/g, '');
    if (sanitized.length !== 8) {
      addLine('✖ CEP inválido. O CEP deve conter exatamente 8 dígitos.', 'red');
    } else {
      const res = await fetch('/api/cep?cep=' + sanitized);
      const data = await res.json();

      if (data.erro) {
        addLine('✖ ' + data.erro, 'red');
      } else {
        addLine('✔ Localização confirmada: ' + data.cidade + ' — ' + data.bairro, 'green');
      }
    }
  } catch (err) {
    addLine('✖ Não foi possível consultar o CEP. Verifique sua conexão.', 'red');
  }

  // Register medication regardless of CEP result
  const med = {
    id: generateId(),
    name: tempMed.name.trim(),
    dosage: tempMed.dosage ? tempMed.dosage.trim() : '',
    time: tempMed.time
  };

  medications.push(med);
  updateMedCount();

  addBlank();
  addLine('✔ Medicamento "' + med.name + '" agendado para as ' + med.time + ' com sucesso!', 'green bold');
  addLine('  ID: ' + med.id, 'dim');
  showMenu();
}

// ---- List ----
function listMedications() {
  addBlank();
  if (medications.length === 0) {
    addLine('⚠ Nenhum medicamento agendado no momento.', 'yellow');
    showMenu();
    return;
  }

  addLine('── Agenda de Medicamentos ──', 'blue bold');
  addBlank();

  const table = document.createElement('table');
  table.className = 'med-table line-fade-in';

  const thead = document.createElement('thead');
  thead.innerHTML = '<tr><th>ID</th><th>Nome</th><th>Dosagem</th><th>Horário</th></tr>';
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  medications.forEach(med => {
    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td class="id-cell" title="' + med.id + '">' + med.id.slice(0, 8) + '…</td>' +
      '<td>' + escapeHtml(med.name) + '</td>' +
      '<td>' + escapeHtml(med.dosage || '—') + '</td>' +
      '<td>' + med.time + '</td>';
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  terminalBody.appendChild(table);

  addBlank();
  addLine('Total: ' + medications.length + ' medicamento(s)', 'dim');
  scrollToBottom();
  showMenu();
}

// ---- Remove ----
function removeMedicationPrompt() {
  addBlank();
  if (medications.length === 0) {
    addLine('⚠ Não há medicamentos para remover.', 'yellow');
    showMenu();
    return;
  }

  addLine('── Remover Medicamento ──', 'blue bold');
  addBlank();

  medications.forEach((med, i) => {
    addLine('  ' + med.id.slice(0, 8) + '…  →  ' + med.name, '');
  });

  addBlank();
  currentState = 'REMOVE_ID';
  showInput('ID (primeiros 8 chars):', '');
}

function handleRemove(idInput) {
  const trimmed = idInput.trim().toLowerCase();
  const index = medications.findIndex(m => m.id === trimmed || m.id.startsWith(trimmed));

  if (index === -1) {
    addLine('✖ Medicamento com ID informado não encontrado.', 'red');
  } else {
    const removed = medications.splice(index, 1)[0];
    updateMedCount();
    addLine('✔ Medicamento "' + removed.name + '" removido com sucesso.', 'green');
  }

  showMenu();
}

// ---- Utilities ----
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ---- Boot ----
addLine('MedLembrete v1.0.0', 'dim');
addLine('Node.js CLI adaptado para a web', 'dim');
showMenu();

// Keep focus on input when clicking terminal
terminalBody.addEventListener('click', () => {
  const input = document.getElementById('active-input');
  if (input && !input.disabled) input.focus();
});
</script>
</body>
</html>
